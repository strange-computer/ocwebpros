[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# 301 Redirects for legacy domain
[[redirects]]
  from = "https://lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true


