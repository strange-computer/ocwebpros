[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# 301 Redirects for legacy domain
[[redirects]]
  from = "https://lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.lakeforestwebsites.com/*"
  to = "https://ocwebpros.com/:splat"
  status = 301
  force = true


